# courses/shared/config.yaml
#
# Unified training configuration for Spatial-LLaVA.
#
# Structure:
#   base     — shared defaults for both modes
#   main     — overrides for main training (LoRA + head, 10 epochs)
#   ablation — overrides for ablation (head only, 3 epochs)

# ── Base (shared defaults) ────────────────────────────────────────────────────
base:
  seed: 42

  model:
    model_id: "llava-hf/llava-1.5-7b-hf"
    lora_rank: 16
    hidden_size: 4096
    regression_intermediate: 512

  training:
    batch_size: 4
    num_workers: 2
    gradient_accumulation_steps: 4
    log_interval: 50
    eval_interval: 1
    save_interval: 500

  optimizer:
    learning_rate: 1.0e-4
    warmup_steps: 500
    weight_decay: 0.01
    gradient_clip: 1.0

  loss:
    iou_weight: 1.0
    l1_weight: 1.0

  hardware:
    fp16: true
    gradient_checkpointing: true

  paths:
    data_dir: "~/SharedFolder/MDAIE/group6/data/"
    checkpoints_dir: "~/SharedFolder/MDAIE/group6/checkpoints/"
    results_baseline: "~/SharedFolder/MDAIE/group6/results/baseline/"
    results_main: "~/SharedFolder/MDAIE/group6/results/main/"
    results_ablation: "~/SharedFolder/MDAIE/group6/results/ablation/"
    log_dir: "~/SharedFolder/MDAIE/group6/logs/"
    hf_home: "~/SharedFolder/MDAIE/group6/hf_cache/"

  eval:
    n_examples: 20
    failure_iou_threshold: 0.3

# ── Main training ─────────────────────────────────────────────────────────────
# LoRA + regression head, 10 epochs
# Member 4 uses epoch 10 for FastAPI (61.502)
# Member 3 uses epoch 3 checkpoint for Gradio demo (51.511)
main:
  training:
    num_epochs: 10
    save_interval: 500

  optimizer:
    warmup_steps: 1000

  paths:
    output_dir: "~/SharedFolder/MDAIE/group6/checkpoints/main/"
    results_dir: "~/SharedFolder/MDAIE/group6/results/main/"

# ── Ablation training ─────────────────────────────────────────────────────────
# Head only, LLM frozen, 3 epochs
# Proves contribution of LoRA in 3-way comparison
ablation:
  training:
    num_epochs: 3
    save_interval: 200

  optimizer:
    learning_rate: 5.0e-4
    warmup_steps: 200

  paths:
    output_dir: "~/SharedFolder/MDAIE/group6/checkpoints/ablation/"
    results_dir: "~/SharedFolder/MDAIE/group6/results/ablation/"
