# docker-compose.yml
#
# PURPOSE : Local development on Mac (CPU-only)
# USAGE   :
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f
#   Shell:   docker-compose exec dev bash
#
# NOTE: Training runs on SUTD cluster, NOT here.
#       This is only for writing code and running unit tests.


services:

  dev:
    build:
      context: .                                      # project root
      dockerfile: infrastructure/docker/Dockerfile.dev

    image: spatial-llava:dev
    container_name: spatial-llava-dev

    volumes:
      # Mount entire project so edits on Mac reflect instantly in container
      - .:/workspace

      # Cache pip downloads to speed up repeated installs
      - pip-cache:/root/.cache/pip

    environment:
      - PYTHONPATH=/workspace        # so 'from core.model import ...' works
      - PYTHONDONTWRITEBYTECODE=1    # no .pyc files in mounted volume

    stdin_open: true
    tty: true

# Named volume for pip cache (persists between docker-compose down/up)
volumes:
  pip-cache: