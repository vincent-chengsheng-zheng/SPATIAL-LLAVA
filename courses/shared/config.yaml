# courses/shared/config.yaml
#
# All paths are relative to PROJECT_ROOT (repo root).
# Resolved at runtime by core.paths.PATHS — no hardcoded /tmp/ or ~/SharedFolder.

# ── Base (shared defaults) ────────────────────────────────────────────────────
base:
  seed: 42

  model:
    model_id: "llava-hf/llava-1.5-7b-hf"
    lora_rank: 16
    hidden_size: 4096
    regression_intermediate: 512

  training:
    batch_size: 4
    num_workers: 8
    gradient_accumulation_steps: 4
    log_interval: 50
    eval_interval: 1
    save_interval: 500

  optimizer:
    learning_rate: 1.0e-4
    warmup_steps: 500
    weight_decay: 0.01
    gradient_clip: 1.0

  loss:
    iou_weight: 1.0
    l1_weight: 1.0

  hardware:
    fp16: true
    gradient_checkpointing: true

  # All paths resolved via core.paths.PATHS at runtime — do not hardcode here
  paths:
    data_dir:            "data/"
    coco_dir:            "data/coco/"
    weights_dir:         "weights/"
    checkpoints_dir:     "checkpoints/"
    results_baseline:    "results/baseline/"
    results_main:        "results/main/"
    results_ablation:    "results/ablation/"
    log_dir:             "logs/"

  eval:
    n_examples: 20
    failure_iou_threshold: 0.3

# ── Main training ─────────────────────────────────────────────────────────────
main:
  training:
    num_epochs: 10
    save_interval: 500

  optimizer:
    warmup_steps: 1000

  paths:
    output_dir:   "checkpoints/main/"
    results_dir:  "results/main/"

# ── Ablation training ─────────────────────────────────────────────────────────
ablation:
  training:
    num_epochs: 3
    save_interval: 200

  optimizer:
    learning_rate: 5.0e-4
    warmup_steps: 200

  paths:
    output_dir:   "checkpoints/ablation/"
    results_dir:  "results/ablation/"
